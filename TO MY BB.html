<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Happy 7 Months</title>
<style>
  :root {
    --black: #0a0a0c;
    --card: rgba(30, 30, 35, 0.75);
    --pink: #ff6f9c;
    --pink-glow: rgba(255, 111, 156, 0.3);
    --text: #f5f5f5;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--black);
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    position: relative;
  }

  /* Floating background hearts for a cute aesthetic */
  .bg-heart {
    position: absolute;
    color: rgba(255, 111, 156, 0.15);
    font-size: 20px;
    pointer-events: none;
    animation: floatUp 6s infinite linear;
    user-select: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Sleek Glassmorphism Card Wrapper */
  .card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    width: 100%;
    max-width: 380px;
    min-height: 460px;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 30px 24px;
    margin: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 25px var(--pink-glow);
    z-index: 10;
  }

  /* Visual Progress Bar */
  .progress-container {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--pink);
    box-shadow: 0 0 8px var(--pink);
    transition: width 0.3s ease;
  }

  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 260px;
    text-align: center;
  }

  .line {
    font-size: 1.25rem;
    line-height: 1.6;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    width: 100%;
    word-wrap: break-word;
  }

  .line.show {
    opacity: 1;
    transform: translateY(0);
  }

  .heart {
    color: var(--pink);
    font-weight: 700;
    text-shadow: 0 0 8px var(--pink-glow);
  }

  /* Cute UI Button layout */
  .next-btn {
    background: var(--pink);
    color: #121212;
    border: none;
    font-weight: 700;
    font-size: 1.05rem;
    padding: 14px 0;
    width: 100%;
    min-height: 50px;
    border-radius: 16px;
    margin-top: 15px;
    box-shadow: 0 4px 15px var(--pink-glow);
    transition: transform 0.1s ease;
  }

  .next-btn:active {
    transform: scale(0.97);
  }

  /* Ending block and responsive frame */
  .ending {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    width: 100%;
  }

  .ending.show {
    display: flex;
  }

  .gif-wrap {
    width: 100%;
    max-width: 220px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    background: #1a1a1a; /* Prevents visual flashing while loading Tenor */
    min-height: 220px;
  }

  .question {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--pink);
  }

  .choices {
    display: flex;
    gap: 14px;
    width: 100%;
  }

  .choice-btn {
    flex: 1;
    border: none;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 0;
    min-height: 50px;
    border-radius: 16px;
    transition: transform 0.1s ease;
  }

  .choice-btn:active {
    transform: scale(0.96);
  }

  .yes-btn {
    background: var(--pink);
    color: #1a1a1a;
    box-shadow: 0 4px 12px var(--pink-glow);
  }

  .no-btn {
    background: #2d2d35;
    color: #b5b5bd;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .final-note {
    display: none;
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .final-note.show {
    display: block;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

  ];

  var idx = 0;
  var lineEl = document.getElementById("lineText");
  var nextBtn = document.getElementById("nextBtn");
  var ending = document.getElementById("ending");
  var yesBtn = document.getElementById("yesBtn");
  var noBtn = document.getElementById("noBtn");
  var choices = document.getElementById("choices");
  var finalNote = document.getElementById("finalNote");
  var progressBar = document.getElementById("progressBar");

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderLine(raw) {
    var escaped = escapeHtml(raw);
    escaped = escaped.replace(/&lt;3/g, '<span class="heart">&lt;3</span>');
    return escaped;
  }

  function updateProgress() {
    var percentage = ((idx + 1) / lines.length) * 100;
    progressBar.style.width = percentage + "%";
  }

  function showLine(i) {
    lineEl.innerHTML = renderLine(lines[i]);
    lineEl.classList.remove("show");
    requestAnimationFrame(function () {
      lineEl.classList.add("show");
    });
    updateProgress();
  }

  showLine(idx);

  nextBtn.addEventListener("click", function () {
    lineEl.classList.remove("show");
    setTimeout(function () {
      idx++;
      if (idx >= lines.length) {
        nextBtn.style.display = "none";
        lineEl.style.display = "none";
        progressBar.parentElement.style.display = "none";
        ending.classList.add("show");
      } else {
        showLine(idx);
      }
    }, 320);
  });

  function reveal() {
    choices.style.display = "none";
    document.querySelector('.question').style.display = "none";
    finalNote.classList.add("show");
  }

  yesBtn.addEventListener("click", reveal);
  noBtn.addEventListener("click", reveal);
</script>
